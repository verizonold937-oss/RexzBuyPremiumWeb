<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Happy Birthday! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* mencegah teks terblok aksen */
        }

        body {
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #ffdde1 0%, #f9c9e2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            cursor: pointer;
        }

        /* efek balon latar belakang */
        .balloon {
            position: fixed;
            bottom: -120px;
            font-size: 2.4rem;
            opacity: 0.6;
            animation: floatUp 9s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-120vh) rotate(20deg);
                opacity: 0;
            }
        }

        /* kartu utama */
        .card {
            background: rgba(255, 248, 245, 0.95);
            backdrop-filter: blur(3px);
            border-radius: 68px;
            box-shadow: 0 30px 45px rgba(255, 105, 180, 0.3), 0 10px 20px rgba(0,0,0,0.1);
            max-width: 700px;
            width: 100%;
            padding: 30px 25px 45px;
            text-align: center;
            transition: all 0.3s ease;
            z-index: 10;
            border: 1px solid rgba(255,255,200,0.7);
        }

        .cake-icon {
            font-size: 80px;
            filter: drop-shadow(2px 6px 12px rgba(0,0,0,0.2));
            animation: bounceSoft 2s infinite ease;
        }

        @keyframes bounceSoft {
            0%,100%{ transform: translateY(0);}
            50%{ transform: translateY(-8px);}
        }

        h1 {
            font-size: 3.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e84393, #f39c12);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 10px 0 8px;
            letter-spacing: -0.5px;
        }

        .nama {
            font-size: 2.3rem;
            font-weight: 700;
            color: #c44569;
            background: #fff0f5;
            display: inline-block;
            padding: 5px 25px;
            border-radius: 60px;
            margin: 10px 0 15px;
            box-shadow: inset 0 0 0 2px white, 0 6px 12px rgba(0,0,0,0.05);
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #4a2c2d;
            background: #fffafc;
            padding: 20px 18px;
            border-radius: 48px;
            margin: 25px 0;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            font-weight: 600;
        }

        .birthday-date {
            font-size: 1rem;
            background: #ffe3ed;
            display: inline-block;
            padding: 8px 18px;
            border-radius: 40px;
            color: #b34180;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
        }

        button {
            font-family: 'Quicksand', sans-serif;
            background: #ff85a1;
            border: none;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: #e84393;
            transform: scale(1.02);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        .fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: #b97f8f;
            opacity: 0.8;
        }

        @media (max-width: 550px) {
            .card { padding: 25px 18px; }
            h1 { font-size: 2.5rem; }
            .nama { font-size: 1.7rem; }
            .message { font-size: 1rem; }
            button { padding: 10px 18px; font-size: 0.9rem;}
        }

        /* sentuhan musik note */
        .music-note {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255,255,240,0.8);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            backdrop-filter: blur(8px);
            z-index: 20;
            color: #c44569;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="cake-icon">🎂✨🎈</div>
    <h1>Happy Birthday!</h1>
    <div class="nama" id="namaTamu">Sayangku</div>
    <div class="birthday-date">🎉🎁  Today is all about you!  🎁🎉</div>
    <div class="message" id="pesanUcapan">
        🌟 Semoga hari spesialmu dipenuhi cinta, tawa, dan mimpi indah.<br>
        Kamu luar biasa! Terima kasih telah menjadi cahaya di hidup banyak orang.<br>
        🥳  SELAMAT ULANG TAHUN  🥳
    </div>
    <div class="btn-group">
        <button id="kejutanBtn">🎁 Kejutan Kembang Api 🎆</button>
        <button id="ubahNamaBtn">💖 Ubah Nama Penerima</button>
        <button id="resetBtn">🔄 Reset Ucapan</button>
    </div>
    <footer>✨ Klik di mana saja untuk kembang api kecil ✨</footer>
</div>

<div class="music-note" id="musicToggle">
    <span>🎵</span> <span id="musicStatus">Putar Musik</span>
</div>

<!-- Canvas untuk efek kembang api modern -->
<canvas id="fireworksCanvas" class="fireworks-canvas"></canvas>

<script>
    (function(){
        // ------------------- KONFIGURASI NAMA & PESAN DINAMIS ------------------
        let currentName = "Sayangku";
        let customMessage = "🌟 Semoga hari spesialmu dipenuhi cinta, tawa, dan mimpi indah.<br>Kamu luar biasa! Terima kasih telah menjadi cahaya di hidup banyak orang.<br>🥳  SELAMAT ULANG TAHUN  🥳";
        
        const namaSpan = document.getElementById('namaTamu');
        const pesanDiv = document.getElementById('pesanUcapan');
        
        function updateUI(){
            namaSpan.innerText = currentName;
            pesanDiv.innerHTML = customMessage;
        }
        
        // Ubah nama
        document.getElementById('ubahNamaBtn').addEventListener('click', () => {
            let newName = prompt("Masukkan nama orang yang berulang tahun:", currentName);
            if(newName && newName.trim() !== ""){
                currentName = newName.trim();
                updateUI();
                // trigger efek kecil
                triggerMiniSpark();
            } else if(newName === "") {
                alert("Nama tidak boleh kosong :)");
            }
        });
        
        // Reset ucapan ke default
        document.getElementById('resetBtn').addEventListener('click', () => {
            customMessage = "🌟 Semoga hari spesialmu dipenuhi cinta, tawa, dan mimpi indah.<br>Kamu luar biasa! Terima kasih telah menjadi cahaya di hidup banyak orang.<br>🥳  SELAMAT ULANG TAHUN  🥳";
            updateUI();
            showNotification("🎉 Ucapan direset ke awal!");
        });
        
        // ------------------- MUSIK SEDERHANA (Web Audio / tone generator opsional) 
        // kita buatkan lingkungan musik sederhana dengan Oscillator (bukan file eksternal)
        // Agar tidak perlu file mp3, kita gunakan Web Audio API untuk nada bahagia
        let audioCtx = null;
        let isMusicPlaying = false;
        let currentInterval = null;
        
        function playShortTone(freq, duration, type = 'sine') {
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // pastikan context aktif
            if(audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.start();
            osc.stop(now + duration);
        }
        
        function playBirthdayMelody() {
            // Melodi sederhana: Happy birthday to you...
            const melody = [ 
                { note: 261.63, dur: 0.4 }, // C
                { note: 261.63, dur: 0.4 },
                { note: 293.66, dur: 0.5 }, // D
                { note: 261.63, dur: 0.5 },
                { note: 349.23, dur: 0.6 }, // F
                { note: 329.63, dur: 0.8 }, // E
                { note: 261.63, dur: 0.4 },
                { note: 261.63, dur: 0.4 },
                { note: 293.66, dur: 0.5 },
                { note: 261.63, dur: 0.5 },
                { note: 392.00, dur: 0.6 }, // G
                { note: 349.23, dur: 0.8 },
                { note: 261.63, dur: 0.4 },
                { note: 261.63, dur: 0.4 },
                { note: 523.25, dur: 0.5 }, // C5
                { note: 440.00, dur: 0.5 }, // A
                { note: 349.23, dur: 0.6 },
                { note: 329.63, dur: 0.6 },
                { note: 293.66, dur: 1.0 }
            ];
            let timeAcc = 0;
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            for(let i=0; i<melody.length; i++) {
                setTimeout((freq, dur) => {
                    playShortTone(freq, dur, 'triangle');
                }, timeAcc * 1000, melody[i].note, melody[i].dur);
                timeAcc += melody[i].dur;
            }
        }
        
        function startBackgroundMusic() {
            if(currentInterval) clearInterval(currentInterval);
            // ulang melodi setiap 12 detik
            playBirthdayMelody();
            currentInterval = setInterval(() => {
                if(isMusicPlaying){
                    playBirthdayMelody();
                }
            }, 13000);
        }
        
        function stopBackgroundMusic() {
            if(currentInterval) {
                clearInterval(currentInterval);
                currentInterval = null;
            }
        }
        
        const musicToggleBtn = document.getElementById('musicToggle');
        const musicStatusSpan = document.getElementById('musicStatus');
        
        function toggleMusic(){
            if(!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if(audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    // izinkan
                });
            }
            if(!isMusicPlaying){
                isMusicPlaying = true;
                startBackgroundMusic();
                musicStatusSpan.innerText = "Musik ON 🎶";
                showNotification("🎵 Selamat Ulang Tahun! Musik ceria dimulai");
            } else {
                isMusicPlaying = false;
                stopBackgroundMusic();
                musicStatusSpan.innerText = "Putar Musik";
                showNotification("🔇 Musik dihentikan");
            }
        }
        
        musicToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        // ------------------- KEMBANG API (CANVAS) MODERN ------------------
        const canvas = document.getElementById('fireworksCanvas');
        let ctx = canvas.getContext('2d');
        let particles = [];
        let animationId = null;
        let resizeHandler = null;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
        resizeCanvas();
        
        class FireParticle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.gravity = 0.08;
                this.alpha = 1;
                this.decay = 0.018;
                this.size = 3 + Math.random() * 4;
            }
            update() {
                this.vx *= 0.99;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }
        
        function createExplosion(x, y, colorTheme = null) {
            const colors = ['#FFB6C1', '#FF69B4', '#FFA07A', '#FADADD', '#F0E68C', '#FFD700', '#FF8C00', '#FF1493'];
            let baseColors = colorTheme ? [colorTheme] : colors;
            let count = 38 + Math.floor(Math.random() * 35);
            for(let i=0; i<count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 1.8 + Math.random() * 4;
                let vx = Math.cos(angle) * speed * (Math.random() * 1.2);
                let vy = Math.sin(angle) * speed * (Math.random() * 1.2);
                let col = baseColors[Math.floor(Math.random() * baseColors.length)];
                particles.push(new FireParticle(x, y, col, vx, vy));
            }
        }
        
        function animateFireworks() {
            if(!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let keepAnim = false;
            for(let i=0; i<particles.length; i++) {
                let alive = particles[i].update();
                particles[i].draw(ctx);
                if(alive) keepAnim = true;
                else {
                    particles.splice(i,1);
                    i--;
                }
            }
            if(keepAnim || particles.length > 0) {
                animationId = requestAnimationFrame(animateFireworks);
            } else {
                if(animationId) cancelAnimationFrame(animationId);
                animationId = null;
            }
        }
        
        function startFireworksAt(x, y, customColor=null) {
            createExplosion(x, y, customColor);
            if(animationId === null) {
                animateFireworks();
            }
            // juga buat beberapa ledakan kecil di sekitar
            for(let i=0;i<2;i++) {
                setTimeout(() => {
                    createExplosion(x + (Math.random()-0.5)*40, y+(Math.random()-0.5)*40, customColor);
                    if(animationId===null) animateFireworks();
                }, i*70);
            }
        }
        
        function randomFireworksFull() {
            for(let i=0;i<6;i++) {
                setTimeout(() => {
                    const randX = Math.random() * canvas.width;
                    const randY = Math.random() * canvas.height * 0.7 + 50;
                    startFireworksAt(randX, randY);
                }, i*150);
            }
        }
        
        // trigger mini spark saat ubah nama
        function triggerMiniSpark() {
            const rect = canvas.getBoundingClientRect();
            const centerX = window.innerWidth/2;
            const centerY = window.innerHeight/2;
            startFireworksAt(centerX, centerY, "#FFD966");
            setTimeout(() => {
                startFireworksAt(centerX-40, centerY-20, "#FFA07A");
            }, 100);
        }
        
        // Event tombol kejutan kembang api
        document.getElementById('kejutanBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            randomFireworksFull();
            showNotification("🎆✨ SELAMAT! Kembang Api Cinta Untukmu ✨🎆");
            // mainkan nada kecil
            if(audioCtx && audioCtx.state !== 'suspended') {
                playShortTone(523.25, 0.3, 'sine');
                setTimeout(()=> playShortTone(659.25, 0.3), 150);
            }
        });
        
        // klik di body / card juga bisa memicu kembang api kecil (tapi tidak mengganggu tombol)
        document.body.addEventListener('click', (e) => {
            // jangan jika klik tombol atau music note
            if(e.target.closest('button') || e.target.closest('#musicToggle')) return;
            const x = e.clientX;
            const y = e.clientY;
            if(x && y) {
                startFireworksAt(x, y, "#FFB7C5");
            } else {
                // fallback center
                startFireworksAt(window.innerWidth/2, window.innerHeight/2, "#FFB7C5");
            }
            playShortTone(440, 0.2, 'sine');
        });
        
        // Notifikasi kecil (toast style)
        function showNotification(msg) {
            let toast = document.createElement('div');
            toast.innerText = msg;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#ff6f91';
            toast.style.color = 'white';
            toast.style.padding = '8px 20px';
            toast.style.borderRadius = '40px';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '1000';
            toast.style.fontSize = '0.9rem';
            toast.style.boxShadow = '0 5px 12px black';
            toast.style.backdropFilter = 'blur(8px)';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }
        
        // Balon latar belakang
        function createBalloons() {
            const balloonArr = ['🎈', '🎈', '🎈', '🎈', '🎀', '🎉', '✨', '🎂'];
            for(let i=0;i<18;i++) {
                let balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.innerText = balloonArr[Math.floor(Math.random()*balloonArr.length)];
                let size = 1.4 + Math.random() * 1.5;
                balloon.style.fontSize = `${size}rem`;
                balloon.style.left = `${Math.random() * 100}%`;
                balloon.style.animationDuration = `${6 + Math.random() * 8}s`;
                balloon.style.animationDelay = `${Math.random() * 8}s`;
                document.body.appendChild(balloon);
            }
        }
        createBalloons();
        
        // Inisialisasi: jika user klik pertama kali pada document untuk mengaktifkan audio
        const enableAudioOnFirstTouch = () => {
            if(audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
                showNotification("🔊 Suara aktif! Klik tombol musik jika ingin melodi🎵");
            }
            document.removeEventListener('click', enableAudioOnFirstTouch);
            document.removeEventListener('touchstart', enableAudioOnFirstTouch);
        };
        document.addEventListener('click', enableAudioOnFirstTouch);
        document.addEventListener('touchstart', enableAudioOnFirstTouch);
        
        // Tampilkan pesan selamat datang kecil
        setTimeout(() => {
            showNotification("🎂 Selamat Ulang Tahun! Klik di mana saja untuk kembang api ✨");
        }, 500);
    })();
</script>
</body>
</html>
